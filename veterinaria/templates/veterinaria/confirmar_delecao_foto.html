{% extends 'veterinaria/base.html' %}

{% block content %}
    <div style="text-align: center; padding: 40px;">
        <h2 style="color: #e74c3c;">Atenção!</h2>
        <p>Você tem certeza que deseja deletar esta foto permanentemente?</p>
        
        <div style="margin: 20px auto; border: 1px solid #ccc; padding: 10px; max-width: 250px;">
            <img src="{{ foto.imagem.url }}" alt="Foto do Boi" style="max-width: 100%; display: block;">
        </div>

        <form method="POST" style="margin-top: 30px;">
            {% csrf_token %}
            <button type="submit" class="btn" style="background-color: #e74c3c;">Sim, Quero Deletar</button>
            <a href="{% url 'detalhes_boi' pk_boi %}" class="btn" style="background-color: #7f8c8d; margin-left: 15px;">Cancelar e Voltar</a>
        </form>
    </div>
{% endblock %}
